<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prompt Generation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="range"] {
            accent-color: #2563eb;
        }

        #canvas-stage {
            position: relative;
            flex: none;
        }

        #canvas-wrapper {
            background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            background-color: #fff;
            border: 1px dashed #94a3b8;
            position: absolute;
            inset: 0 auto auto 0;
            transform-origin: top left;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .bounding-box {
            position: absolute;
            border: 2px solid #ff0044;
            background: rgba(255, 0, 68, 0.2);
            cursor: grab;
            box-sizing: border-box;
        }

        .bounding-box.selected {
            border-color: #0066FF;
            background: rgba(0, 102, 255, 0.2);
            z-index: 10;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 1px solid black;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
        }

        .color-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.5rem;
        }

        .swatch {
            width: 2rem;
            height: 2rem;
            border: 1px solid #000;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: transparent;
            transition: 0.2s;
        }

        .swatch:hover {
            color: #fff;
            text-shadow: 0 0 2px #000;
        }
    </style>

</head>

<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">

    <main class="mx-auto flex w-full max-w-[1800px] flex-col gap-4 p-4 lg:p-6">
        <header class="rounded-lg border border-slate-200 bg-white px-4 py-3 shadow-sm">
            <div class="grid gap-4 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_auto] lg:items-end">
                <div class="space-y-2">
                    <div class="flex items-center justify-between gap-3">
                        <label for="canvas-width" class="text-sm font-semibold text-slate-700">Width</label>
                        <span id="w-val" class="cursor-text rounded-md bg-slate-100 px-2 py-1 font-mono text-sm text-slate-900" tabindex="0" title="Double-click to edit">1024</span>
                    </div>
                    <input type="range" id="canvas-width" min="256" max="4096" step="16" value="1024" class="w-full">
                </div>
                <div class="space-y-2">
                    <div class="flex items-center justify-between gap-3">
                        <label for="canvas-height" class="text-sm font-semibold text-slate-700">Height</label>
                        <span id="h-val" class="cursor-text rounded-md bg-slate-100 px-2 py-1 font-mono text-sm text-slate-900" tabindex="0" title="Double-click to edit">1024</span>
                    </div>
                    <input type="range" id="canvas-height" min="256" max="4096" step="16" value="1024" class="w-full">
                </div>
                <button onclick="initCanvas()" class="inline-flex h-10 items-center justify-center rounded-md bg-blue-600 px-4 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Reset Canvas</button>
            </div>
        </header>

        <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_420px]">
            <section class="flex min-w-0 flex-col gap-4">
                <section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
                    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
                        <h1 class="text-base font-semibold text-slate-900">Prompt Canvas</h1>
                        <span class="rounded-md bg-slate-100 px-2 py-1 text-xs font-medium text-slate-600" id="canvas-size-label">1024 x 1024</span>
                    </div>
                    <div class="bg-slate-100 p-4">
                        <div id="canvas-viewport" class="mx-auto max-h-[840px] max-w-full overflow-auto rounded-md border border-slate-200 bg-white p-2">
                            <div id="canvas-stage">
                                <div id="canvas-wrapper"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="grid gap-4">
                    <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
                        <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
                            <h2 class="text-sm font-semibold text-slate-900">Prompt JSON</h2>
                            <div class="flex gap-2">
                                <button onclick="parsePromptTextarea()" class="inline-flex h-9 items-center justify-center rounded-md border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Load JSON</button>
                                <button onclick="generateJSON()" class="inline-flex h-9 items-center justify-center rounded-md bg-emerald-600 px-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2">Generate JSON</button>
                            </div>
                        </div>
                        <textarea id="json-output" class="h-[320px] w-full resize-y rounded-md border border-slate-300 bg-white p-3 font-mono text-sm leading-5 text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Paste or generate prompt JSON"></textarea>
                        <div id="json-status" class="mt-2 min-h-5 text-xs text-slate-500"></div>
                    </section>
                </div>
            </section>

            <aside class="space-y-4">
                <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
                    <h2 class="mb-4 border-b border-slate-200 pb-2 text-sm font-semibold text-slate-900">Global Settings</h2>
                    <div class="mb-4 flex flex-wrap items-center gap-2">
                        <span class="text-sm font-semibold text-slate-700">Mode</span>
                        <input type="radio" id="mode_photo" name="art_mode" value="photo" class="peer/photo sr-only" onchange="setPhotoArtstyle(0)">
                        <label for="mode_photo" class="cursor-pointer rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 peer-checked/photo:bg-blue-600 peer-checked/photo:text-white">photo</label>

                        <input type="radio" id="mode_artstyle" name="art_mode" value="art_style" class="peer/art sr-only" checked onchange="setPhotoArtstyle(1)">
                        <label for="mode_artstyle" class="cursor-pointer rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 peer-checked/art:bg-blue-600 peer-checked/art:text-white">art_style</label>
                    </div>
                    <div class="space-y-3">
                        <div class="space-y-1.5"><label for="high_level_description" class="text-sm font-semibold text-slate-700">High Level Description</label><textarea id="high_level_description" class="min-h-24 w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                        <div class="space-y-1.5"><label for="aesthetics" class="text-sm font-semibold text-slate-700">Aesthetics</label><input type="text" id="aesthetics" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <div class="space-y-1.5"><label for="lighting" class="text-sm font-semibold text-slate-700">Lighting</label><input type="text" id="lighting" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <div class="space-y-1.5"><label for="medium" class="text-sm font-semibold text-slate-700">Medium</label><input type="text" id="medium" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-100 disabled:text-slate-500"></div>
                        <div class="space-y-1.5"><label id="mode_label" for="art_style" class="text-sm font-semibold text-slate-700">Art Style</label><input type="text" id="art_style" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                        <div class="space-y-1.5"><label for="background" class="text-sm font-semibold text-slate-700">Background</label><textarea id="background" class="min-h-24 w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea></div>
                        <div>
                            <label for="global-color-picker" class="text-sm font-semibold text-slate-700">Global Color Palette (Max 16)</label>
                            <div class="mt-2 flex items-center gap-2">
                                <input type="color" id="global-color-picker" class="h-9 w-12 rounded-md border border-slate-300 bg-white p-1">
                                <button onclick="addColor('global')" class="inline-flex h-9 items-center justify-center rounded-md border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Add</button>
                            </div>
                            <div id="global-colors" class="color-list"></div>
                        </div>
                    </div>
                </section>

                <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm" id="box-panel" style="display: none;">
                    <div class="mb-4 flex items-center justify-between gap-3 border-b border-slate-200 pb-2">
                        <h2 class="text-sm font-semibold text-slate-900">Selected Box Properties</h2>
                        <div class="flex items-center gap-1">
                            <button type="button" onclick="cycleSelectedBox(-1)" class="inline-flex h-7 w-8 items-center justify-center rounded-md border border-slate-300 bg-white text-xs font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" title="Previous box">&leftarrow;</button>
                            <button type="button" onclick="cycleSelectedBox(1)" class="inline-flex h-7 w-8 items-center justify-center rounded-md border border-slate-300 bg-white text-xs font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" title="Next box">&rightarrow;</button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="space-y-1.5">
                            <label for="box-mode" class="text-sm font-semibold text-slate-700">Mode</label>
                            <select id="box-mode" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="updateBoxData()" oninput="updateBoxData()">
                                <option value="obj">Object (obj)</option>
                                <option value="text">Text (text)</option>
                            </select>
                        </div>
                        <div class="space-y-1.5" id="text-input-group" style="display: none;">
                            <label for="box-text" class="text-sm font-semibold text-slate-700">Text Content</label>
                            <input type="text" id="box-text" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="updateBoxData()" oninput="updateBoxData()">
                        </div>
                        <div class="space-y-1.5">
                            <label for="box-desc" class="text-sm font-semibold text-slate-700">Description</label>
                            <textarea id="box-desc" class="min-h-24 w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="updateBoxData()" oninput="updateBoxData()"></textarea>
                        </div>
                        <div>
                            <label for="box-color-picker" class="text-sm font-semibold text-slate-700">Box Color Palette (Max 5)</label>
                            <div class="mt-2 flex items-center gap-2">
                                <input type="color" id="box-color-picker" class="h-9 w-12 rounded-md border border-slate-300 bg-white p-1">
                                <button onclick="addColor('box')" class="inline-flex h-9 items-center justify-center rounded-md border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Add</button>
                            </div>
                            <div id="box-colors" class="color-list"></div>
                        </div>
                        <button onclick="deleteSelectedBox()" class="inline-flex h-10 w-full items-center justify-center rounded-md bg-rose-600 px-4 text-sm font-semibold text-white shadow-sm hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:ring-offset-2">Delete Box</button>
                    </div>
                </section>
            </aside>
        </div>
    </main>

                currentBoxDOM.style.height = Math.max(10, initialBoxH + dy) + 'px';
            }
        });

        // Box Forms logic
        function selectBox(id) {
            selectedBoxId = id;
            document.querySelectorAll('.bounding-box').forEach(el => el.classList.remove('selected'));
            if (id) {
                const box = boxes.find(b => b.id === id);
                const dom = document.getElementById(id);
                if (!box || !dom) {
                    selectedBoxId = null;
                    boxPanel.style.display = 'none';
                    setBoxPanelHighlight(null);
                    return;
                }

                dom.classList.add('selected');
                boxPanel.style.display = 'block';
                setBoxPanelHighlight(dom);
                document.getElementById('box-mode').value = box.mode;
                document.getElementById('box-text').value = box.text;
                document.getElementById('box-desc').value = box.desc;
                document.getElementById('text-input-group').style.display = box.mode === 'text' ? 'block' : 'none';
                renderColors('box');
            } else {
                boxPanel.style.display = 'none';
                setBoxPanelHighlight(null);
            }
        }

        function cycleSelectedBox(direction) {
            const selectableBoxes = boxes.filter(box => document.getElementById(box.id));
            if (selectableBoxes.length === 0) {
                selectBox(null);
                return;
            }

            const currentIndex = selectableBoxes.findIndex(box => box.id === selectedBoxId);
            const startIndex = currentIndex === -1 ? 0 : currentIndex;
            const nextIndex = (startIndex + direction + selectableBoxes.length) % selectableBoxes.length;
            selectBox(selectableBoxes[nextIndex].id);
        }

        function updateBoxData() {
            if (!selectedBoxId) return;
            const box = boxes.find(b => b.id === selectedBoxId);
            if (!box) return;
            box.mode = document.getElementById('box-mode').value;
            box.text = document.getElementById('box-text').value;
            box.desc = document.getElementById('box-desc').value;
            document.getElementById('text-input-group').style.display = box.mode === 'text' ? 'block' : 'none';
        }

        function deleteSelectedBox() {
            if (!selectedBoxId) return;
            const dom = document.getElementById(selectedBoxId);
            if (dom) dom.remove();
            boxes = boxes.filter(b => b.id !== selectedBoxId);
            selectBox(null);
        }

        // JSON Generation
        function generateJSON() {
            // Save current bounding box positions to state
            boxes.forEach(box => {
                const dom = document.getElementById(box.id);
                if (dom) {
                    box.x = parseFloat(dom.style.left);
                    box.y = parseFloat(dom.style.top);
                    box.w = parseFloat(dom.style.width);
                    box.h = parseFloat(dom.style.height);
                }
            });

            // Normalize Coordinates 0-1000
            const norm = (val, max) => Math.min(1000, Math.max(0, Math.round((val / max) * 1000)));

            const elements = boxes.map(box => {
                const x1 = norm(box.x, canvasW);
                const y1 = norm(box.y, canvasH);
                const x2 = norm(box.x + box.w, canvasW);
                const y2 = norm(box.y + box.h, canvasH);

                let el = {
                    type: box.mode,
                    bbox: [y1, x1, y2, x2],
                };

                if (box.mode === 'text') el.text = box.text;
                el.desc = box.desc;
                if (box.colors && box.colors.length > 0) el.color_palette = box.colors;

                return el;
            });

            var output = {
                high_level_description: document.getElementById('high_level_description').value,
                style_description: {
                    aesthetics: document.getElementById('aesthetics').value,
                    lighting: document.getElementById('lighting').value,
                    //medium: document.getElementById('medium').value,
                    //art_style: document.getElementById('art_style').value,
                    //color_palette: globalPalette
                },
                compositional_deconstruction: {
                    background: document.getElementById('background').value,
                    elements: elements
                }
            };

            // in photo mode, order in prompt should be "photo" then "medium",
            // while in art_style mode order should be "medium" then "art_style"
            if(photoArtStyleMode == MODE_PHOTO){
                output.style_description.photo = document.getElementById('art_style').value;
                output.style_description.medium = document.getElementById('medium').value;
            }
            else{
                output.style_description.medium = document.getElementById('medium').value;
                output.style_description.art_style = document.getElementById('art_style').value
            }

            output.style_description.color_palette = globalPalette

            jsonOutput.value = JSON.stringify(output, null, 2);
            setJSONStatus(`Generated ${elements.length} element${elements.length === 1 ? '' : 's'}.`, 'success');
        }

        function setImage(imgURL){
            canvas.style.backgroundImage = `url("${imgURL}")`
            canvas.style.backgroundSize = "cover"
        }

        function extractComfyUIMetadata(arrayBuffer) {
            const view = new DataView(arrayBuffer);

            // Check valid PNG 8-byte signature
            if (view.byteLength < 8 || view.getUint32(0) !== 0x89504E47 || view.getUint32(4) !== 0x0D0A1A0A) {
                throw new Error("Not a valid PNG file.");
            }

            let offset = 8;
            const result = {};

            while (offset < view.byteLength) {
                if (offset + 8 > view.byteLength) break;

                // Read chunk length and type
                const length = view.getUint32(offset);
                const chunkType = String.fromCharCode(
                    view.getUint8(offset + 4),
                    view.getUint8(offset + 5),
                    view.getUint8(offset + 6),
                    view.getUint8(offset + 7)
                );

                offset += 8; // Move past length and type

                if (chunkType === 'tEXt') {
                    if (offset + length > view.byteLength) break;

                    const chunkData = new Uint8Array(arrayBuffer, offset, length);
                    const nullByteIndex = chunkData.indexOf(0); // Keyword and text are separated by a 0x00 byte

                    if (nullByteIndex !== -1) {
                        const keyword = new TextDecoder('ascii').decode(chunkData.subarray(0, nullByteIndex));

                        if (keyword === 'prompt' || keyword === 'workflow') {
                            const rawText = new TextDecoder('utf-8').decode(chunkData.subarray(nullByteIndex + 1));
                            try {
                                result[keyword] = JSON.parse(rawText);
                            } catch (e) {
                                result[keyword] = rawText; // Fallback if JSON parsing fails
                            }
                        }
                    }
                }

                offset += length + 4; // Skip the data segment and the 4-byte CRC trailing checksum
            }
            const found = findPromptJSON(result.prompt) || findPromptJSON(result.workflow);
            return found?.prompt;
        }

        function isPromptJSON(value) {
            return value
                && typeof value === 'object'
                && !Array.isArray(value)
                && Object.prototype.hasOwnProperty.call(value, 'high_level_description')
                && value.style_description
                && value.compositional_deconstruction;
        }

        function tryParseJSON(value) {
            if (typeof value !== 'string') return value;
            const trimmed = value.trim();
            if (!trimmed) return null;
            return JSON.parse(trimmed);
        }

        function extractCanvasSizeFromWorkflow(value) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) return {};

            let width = null;
            let height = null;
            Object.values(value).forEach(node => {
                const title = String(node?._meta?.title || '').toLowerCase();
                const nodeValue = Number(node?.inputs?.value);
                if (!Number.isFinite(nodeValue)) return;

                if (title.includes('width')) width = nodeValue;
                if (title.includes('height')) height = nodeValue;
            });

            return { width, height };
        }

        function findPromptJSON(value, seen = new Set()) {
            let parsed;
            try {
                parsed = tryParseJSON(value);
            } catch (e) {
                return null;
            }

            if (!parsed || typeof parsed !== 'object') return null;
            if (seen.has(parsed)) return null;
            seen.add(parsed);

            if (isPromptJSON(parsed)) return { prompt: parsed };

            const canvasSize = extractCanvasSizeFromWorkflow(parsed);
            const withCanvasSize = (result) => {
                if (!result) return null;
                return {
                    prompt: result.prompt,
                    width: result.width ?? canvasSize.width,
                    height: result.height ?? canvasSize.height,
                };
            };

            if (parsed.prompt) {
                const result = findPromptJSON(parsed.prompt, seen);
                if (result) return withCanvasSize(result);
            }

            for (const item of Object.values(parsed)) {
                const textInput = item?.inputs?.text;
                if (typeof textInput === 'string') {
                    const result = findPromptJSON(textInput, seen);
                    if (result) return withCanvasSize(result);
                }
            }

            for (const item of Object.values(parsed)) {
                const result = findPromptJSON(item, seen);
                if (result) return withCanvasSize(result);
            }

            return null;
        }

        function sanitizePalette(colors, maxColors) {
            const seen = new Set();
            return (Array.isArray(colors) ? colors : [])
                .map(color => String(color).trim().toUpperCase())
                .filter(color => /^#[0-9A-F]{6}$/.test(color))
                .filter(color => {
                    if (seen.has(color)) return false;
                    seen.add(color);
                    return true;
                })
                .slice(0, maxColors);
        }

        function parseBoxesFromJSON(json) {
            const elements = json?.compositional_deconstruction?.elements || [];
            const fromNorm = (value, max) => {
                const number = Number(value);
                if (!Number.isFinite(number)) return 0;
                return Math.min(max, Math.max(0, number / 1000 * max));
            };

            elements.forEach(element => {
                const bbox = Array.isArray(element?.bbox) ? element.bbox : [0, 0, 0, 0];
                const y1 = fromNorm(bbox[0], canvasH);
                const x1 = fromNorm(bbox[1], canvasW);
                const y2 = fromNorm(bbox[2], canvasH);
                const x2 = fromNorm(bbox[3], canvasW);
                const box = {
                    id: 'box_' + boxCounter++,
                    x: Math.min(x1, x2),
                    y: Math.min(y1, y2),
                    w: Math.abs(x2 - x1),
                    h: Math.abs(y2 - y1),
                    mode: element?.type === 'text' ? 'text' : 'obj',
                    text: element?.text ?? '',
                    desc: element?.desc ?? '',
                    colors: sanitizePalette(element?.color_palette, 5),
                };

                boxes.push(box);
                canvas.appendChild(createBoxElement(box));
            });

            if (boxes.length > 0) selectBox(boxes[0].id);
        }

        function parseParametersFromJSON(json) {
            const style = json.style_description || {};
            const composition = json.compositional_deconstruction || {};
            const isPhotoMode = Object.prototype.hasOwnProperty.call(style, 'photo');

            document.getElementById('high_level_description').value = json.high_level_description ?? '';
            document.getElementById('aesthetics').value = style.aesthetics ?? '';
            document.getElementById('lighting').value = style.lighting ?? '';
            document.getElementById('background').value = composition.background ?? '';

            globalPalette = sanitizePalette(style.color_palette, 16);
            renderColors('global');

            if (isPhotoMode) {
                document.getElementById('mode_photo').checked = true;
                setPhotoArtstyle(MODE_PHOTO);
                document.getElementById('art_style').value = style.photo ?? '';
            } else {
                document.getElementById('mode_artstyle').checked = true;
                setPhotoArtstyle(MODE_ARTSTYLE);
                document.getElementById('art_style').value = style.art_style ?? '';
            }

            document.getElementById('medium').value = style.medium ?? (isPhotoMode ? 'photograph' : '');
        }

        function loadPromptJSON(json, options = {}) {
            if (!isPromptJSON(json)) {
                throw new Error('Unsupported prompt JSON shape.');
            }

            if (options.width || options.height) {
                setCanvasControls(options.width ?? canvasW, options.height ?? canvasH);
            }

            clearCanvasBoxes();
            parseParametersFromJSON(json);
            parseBoxesFromJSON(json);

            if (options.updateTextarea !== false) {
                jsonOutput.value = JSON.stringify(json, null, 2);
            }

            const count = json?.compositional_deconstruction?.elements?.length || 0;
            setJSONStatus(`Loaded ${count} editable element${count === 1 ? '' : 's'}.`, 'success');
        }

        function parsePromptTextarea(options = {}) {
            const found = findPromptJSON(jsonOutput.value);
            if (!found?.prompt) {
                setJSONStatus(options.source === 'paste' ? 'Pasted text is not a supported prompt JSON.' : 'No supported prompt JSON found.', 'error');
                return false;
            }

            try {
                loadPromptJSON(found.prompt, {
                    width: found.width,
                    height: found.height,
                    updateTextarea: true,
                });
                return true;
            } catch (e) {
                setJSONStatus(e.message, 'error');
                return false;
            }
        }

        async function importImage(image){
            if(image.type.startsWith("image")){
                // is image
                const img = new Image();
                img.onload = function() {
                    canvasWSlider.value = this.width.toString();
                    canvasHSlider.value = this.height.toString();
                    initCanvas();
                    setImage(img.src);

                    if(image.type=="image/png"){
                        // is png. try and find workflow metadata
                        image.arrayBuffer()
                        .then(buff => {
                            const json = extractComfyUIMetadata(buff);
                            if (json) {
                                loadPromptJSON(json, { updateTextarea: true });
                            } else {
                                setJSONStatus('No supported prompt JSON found in PNG metadata.', 'error');
                            }
                        })
                        .catch(() => setJSONStatus('Could not read PNG metadata.', 'error'));
                    }
                };
                img.src = URL.createObjectURL(image);
            }
            else{
                alert("images only")
            }
        }

        var photoArtStyleMode = 1;
        const MODE_PHOTO = 0;
        const MODE_ARTSTYLE = 1;
        function setPhotoArtstyle(mode){
            console.log(mode)
            photoArtStyleMode = mode
            if(mode==MODE_PHOTO){
                // photo mode
                document.getElementById("medium").value = "photograph";
                document.getElementById("medium").disabled = true
                document.getElementById("mode_label").innerText = "Photo"
            }
            else if (mode==MODE_ARTSTYLE){
                // art_style mode
                document.getElementById("medium").disabled = false
                document.getElementById("mode_label").innerText = "Art Style"
            }
            else{
                console.error("invalid mode")
            }
        }

        initCanvas();
        setPhotoArtstyle(1)
    </script>
